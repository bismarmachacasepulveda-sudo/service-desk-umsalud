<div class="login-container d-flex align-items-center justify-content-center">
  
  <div class="card login-card shadow-lg border-0">
    <div class="card-body p-5">
      
      <div class="text-center mb-4">
        <img src="assets/logo-umsalud.png" alt="Logo UMSALUD" class="img-fluid login-logo mb-3">
        <h3 class="fw-bold text-primary">RED UMSALUD</h3>
        <p class="text-muted small">Ingreso al Sistema de Gestión</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-custom-danger d-flex align-items-center" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <div>{{ errorMessage }}</div>
      </div>

      <form (ngSubmit)="onLogin()">
        
        <div class="form-floating mb-3">
          <input 
            type="email" 
            class="form-control" 
            id="email" 
            [(ngModel)]="email" 
            name="email" 
            placeholder="name@example.com" 
            required>
          <label for="email">Correo Electrónico</label>
        </div>

        <div class="form-floating mb-4">
          <input 
            type="password" 
            class="form-control" 
            id="password" 
            [(ngModel)]="password" 
            name="password" 
            placeholder="Contraseña" 
            required>
          <label for="password">Contraseña</label>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary btn-lg btn-block fw-bold">
            Ingresar al Sistema
          </button>
        </div>
        <div class="text-center mt-3">
    <small>¿No tienes cuenta? <a routerLink="/registro" class="fw-bold">Regístrate aquí</a></small>
</div>

      </form>

      <div class="text-center mt-4">
        <small class="text-muted">Facultad de Medicina - UMSA &copy; 2025</small>
      </div>

    </div>
  </div>
</div>
