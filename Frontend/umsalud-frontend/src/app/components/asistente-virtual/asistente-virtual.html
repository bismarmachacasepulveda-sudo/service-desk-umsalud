<button class="btn-flotante shadow-lg" (click)="toggleChat()" title="Asistente Virtual IA">
    <i class="bi" [ngClass]="isOpen ? 'bi-x-lg' : 'bi-robot'"></i>
</button>

<div class="chat-window shadow-lg" *ngIf="isOpen">
    
<div class="chat-header text-white p-3 d-flex justify-content-between align-items-center shadow-sm" 
     style="background: linear-gradient(135deg, #00458e 0%, #007bff 100%); border-radius: 15px 15px 0 0;">
    <div>
        <h6 class="m-0 fw-bold d-flex align-items-center">
            <span class="status-dot me-2"></span> <i class="bi bi-robot me-2"></i> UMSI-BOT
        </h6>
        <small style="font-size: 0.7rem; opacity: 0.9;">Asistente de Soporte Técnico</small>
    </div>
    
    <button class="btn btn-sm btn-outline-light border-0 fw-bold py-1 px-2" 
            (click)="crearTicketDeChat()" 
            style="font-size: 0.75rem; background: rgba(255,255,255,0.1);">
        <i class="bi bi-person-raised-hand me-1"></i> Ayuda Humana
    </button>
</div>

    <div class="chat-body p-3" #scrollContainer>
        
        <div *ngIf="mensajes.length === 0" class="text-center text-muted mt-5">
            <i class="bi bi-chat-dots fs-1"></i>
            <p class="small mt-2">¡Hola! Pregúntame sobre problemas técnicos.</p>
        </div>

        <div *ngFor="let msg of mensajes" 
             class="mensaje mb-3" 
             [ngClass]="msg.emisor === 'user' ? 'text-end' : 'text-start'">
            
            <div class="burbuja d-inline-block p-2 px-3 rounded-3 text-start"
                 [ngClass]="msg.emisor === 'user' ? 'bg-primary text-white' : 'bg-light text-dark border'">
                <div class="msg-text" [innerHTML]="renderizarMarkdown(msg.texto)"></div>

                <div *ngIf="msg.archivos && msg.archivos.length > 0" class="mt-3 pt-2 border-top border-secondary-subtle">
                    <small class="d-block text-muted mb-2 fw-bold" style="font-size: 0.75rem;">
                        <i class="bi bi-paperclip"></i> Manuales sugeridos:
                    </small>
                    
                    <div *ngFor="let file of msg.archivos" class="card mb-2 border shadow-sm text-start bg-white">
                        <div class="card-body p-2 d-flex align-items-center">
                            <i class="bi bi-file-earmark-pdf text-danger fs-4 me-2"></i>
                            <div class="flex-grow-1 overflow-hidden" style="font-size: 0.8rem;">
                                <div class="text-truncate fw-bold text-dark">{{ file.nombre_original }}</div>
                                <div class="text-muted text-truncate">{{ file.descripcion || 'Documento de ayuda' }}</div>
                            </div>
                            <a [href]="'http://192.168.1.50:8000/storage/' + file.ruta_archivo" target="_blank" class="btn btn-sm btn-light border ms-1 text-primary">
                                <i class="bi bi-download"></i>
                            </a>
                        </div>
                    </div>
                </div>
                </div>
        </div>

        <div *ngIf="pensando" class="text-start mb-2">
            <div class="burbuja bg-light text-muted border d-inline-block p-2 rounded-3">
                <span class="spinner-grow spinner-grow-sm" style="width: 0.5rem; height: 0.5rem;" role="status"></span>
                <span class="spinner-grow spinner-grow-sm" style="width: 0.5rem; height: 0.5rem; margin-left: 2px;" role="status"></span>
                <span class="spinner-grow spinner-grow-sm" style="width: 0.5rem; height: 0.5rem; margin-left: 2px;" role="status"></span>
            </div>
        </div>

    </div>

    <div class="chat-footer p-2 border-top bg-white">
        <form (ngSubmit)="enviar()" class="d-flex gap-2">
            <input 
                type="text" 
                class="form-control form-control-sm" 
                placeholder="Escribe tu duda aquí..." 
                [(ngModel)]="nuevoMensaje" 
                name="msg" 
                autocomplete="off"
                [disabled]="pensando"
            >
            <button type="submit" class="btn btn-primary btn-sm" [disabled]="!nuevoMensaje.trim() || pensando">
                <i class="bi bi-send-fill"></i>
            </button>
        </form>
    </div>
</div>
