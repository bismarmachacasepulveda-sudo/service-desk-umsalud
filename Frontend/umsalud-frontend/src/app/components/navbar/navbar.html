<nav class="navbar navbar-expand-lg navbar-dark px-4 shadow navbar-custom sticky-top">
  
  <button class="btn btn-outline-light d-lg-none me-2 border-0 rounded-circle" 
          type="button" 
          data-bs-toggle="offcanvas" 
          data-bs-target="#sidebarMenu">
    <i class="bi bi-list fs-3"></i>
  </button>

   <a class="navbar-brand fw-bold" routerLink="/dashboard">
    <img src="assets/logo-umsalud.png" alt="Logo" height="35" class="me-2 bg-white rounded p-1">
    RED UMSALUD
  </a>
  
  <div class="ms-auto d-flex align-items-center gap-2 gap-md-3">
    
<div class="whatsapp-widget d-flex align-items-center" 
     title="Notificaciones WhatsApp">
    
    <i class="bi bi-whatsapp fs-5 me-2" 
       [ngClass]="{'text-success': whatsappActive, 'text-white-50': !whatsappActive}">
    </i>

    <div class="form-check form-switch m-0 p-0 d-flex align-items-center">
        <input class="form-check-input m-0" 
               type="checkbox" 
               role="switch" 
               [checked]="whatsappActive"
               (change)="cambiarPreferencia($event)"
               style="cursor: pointer; width: 2.0em; height: 1.0em;"> 
    </div>
</div>

    <div class="position-relative">
        <app-notification></app-notification>
    </div>

    <div class="vr bg-white opacity-25 d-none d-md-block" style="height: 30px; align-self: center;"></div>

    <div class="dropdown">
      <div class="d-flex align-items-center gap-2" 
           (click)="toggleMenu()" 
           style="cursor: pointer;">
        
        <div class="avatar-nav shadow-sm">
          {{ user?.name?.charAt(0) }}
        </div>

        <div class="text-white text-end d-none d-md-block lh-1">
          <div class="fw-bold small mb-1">{{ user?.name }}</div>
          <span class="badge rounded-pill bg-light text-primary fw-bold" style="font-size: 0.65rem; padding: 0.35em 0.8em;">
            {{ user?.role | uppercase }}
          </span>
        </div>
        <i class="bi bi-chevron-down text-white-50 small ms-1"></i>
      </div>

      <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-3 p-2" 
          [class.show]="menuAbierto" style="right: 0; left: auto;">
        <li>
          <div class="dropdown-header small text-uppercase fw-bold text-muted">Mi Cuenta</div>
        </li>
        <li>
          <a class="dropdown-item py-2 d-flex align-items-center" routerLink="/perfil" (click)="menuAbierto = false">
            <i class="bi bi-person-circle me-3 text-primary fs-5"></i> 
            <span>Mi Perfil</span>
          </a>
        </li>
        <li><hr class="dropdown-divider mx-2"></li>
        <li>
          <button class="dropdown-item py-2 text-danger d-flex align-items-center" (click)="logout()">
            <i class="bi bi-box-arrow-right me-3 fs-5"></i> 
            <span>Cerrar Sesión</span>
          </button>
        </li>
      </ul>
    </div>

  </div>
</nav>
